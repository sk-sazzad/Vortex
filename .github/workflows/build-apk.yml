name: Build Android App (.apk)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code download
        uses: actions/checkout@v4

      - name: ☕ Java 17 setup
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Android SDK setup
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: 🔑 Gradle setup
        run: chmod +x android/gradlew

      - name: 📦 Gradle wrapper download
        run: |
          cd android
          gradle wrapper --gradle-version 8.3

      - name: 🔨 APK build
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🏷️ Version
        id: version
        run: echo "tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Android
          path: android/app/build/outputs/apk/release/*.apk

      - name: 🚀 Auto Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "🌀 Vortex ${{ steps.version.outputs.tag }}"
          body: |
            ## 🌀 Vortex Android App

            ### 📥 Install করো
            1. `Vortex.apk` download করো
            2. Mobile এ install করো
            3. App খোলো → IP ও password দাও → Connect!

            ### ✅ Features
            - Remote Shutdown / Restart / Sleep
            - Volume Control
            - Screenshot
            - Terminal Command
            - File Browser
            - System Info
            - Clipboard Sync
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
