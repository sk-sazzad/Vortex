name: Build Android App (.apk)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code download
        uses: actions/checkout@v4

      - name: ☕ Java 17 setup
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Android SDK setup
        uses: android-actions/setup-android@v3

      - name: 📦 Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: 🔑 Setup Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.9 --distribution-type bin
          chmod +x gradlew

      - name: 🔨 APK build
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --warning-mode none
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 🔍 Find APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Android
          path: android/app/build/outputs/apk/**/*.apk

      - name: 🏷️ Version
        id: version
        run: echo "tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: 🚀 Auto Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "🌀 Vortex ${{ steps.version.outputs.tag }}"
          body: |
            ## 🌀 Vortex Android App

            ### 📥 Install করো
            1. APK download করো
            2. Mobile এ install করো
               (Settings → Unknown Sources → Allow)
            3. App খোলো → IP ও password দাও → Connect!
          files: android/app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
