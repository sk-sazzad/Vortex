name: Build Windows Agent (.exe)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: 📥 Code download করো
        uses: actions/checkout@v4

      - name: 🐍 Python setup করো
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Dependencies install করো
        run: |
          pip install -r agent/requirements.txt
          pip install pyinstaller

      - name: 🔨 .exe বানাও
        run: |
          cd agent
          pyinstaller --onefile --noconsole --name "Vortex-Agent" --icon=../assets/icon.ico agent.py
        continue-on-error: true

      - name: 🔨 .exe বানাও (icon ছাড়া)
        run: |
          cd agent
          pyinstaller --onefile --noconsole --name "Vortex-Agent" agent.py

      - name: 📤 .exe upload করো
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Agent-Windows
          path: agent/dist/Vortex-Agent.exe

      - name: 🚀 Release এ দাও
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: agent/dist/Vortex-Agent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
