name: Build Windows Agent EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent
          pip install websockets psutil Pillow pystray pyinstaller pyautogui

      - name: Build EXE
        run: |
          cd agent
          pyinstaller --onefile --windowed --name "VortexAgent" `
            --hidden-import=websockets `
            --hidden-import=psutil `
            --hidden-import=pystray `
            --hidden-import=PIL `
            --hidden-import=tkinter `
            --hidden-import=pyautogui `
            agent.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: vortex-agent-exe
          path: agent/dist/VortexAgent.exe

      - name: Add to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Vortex v1.0.${{ github.run_number }}"
          files: agent/dist/VortexAgent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
