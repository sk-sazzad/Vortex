name: Build Windows Agent (.exe)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: 📥 Code download করো
        uses: actions/checkout@v4

      - name: 🐍 Python setup করো
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Dependencies install করো
        run: |
          pip install -r agent/requirements.txt
          pip install pyinstaller

      - name: 🔨 .exe বানাও
        run: |
          cd agent
          pyinstaller --onefile --noconsole --name "Vortex-Agent" agent.py

      - name: 🏷️ Version তৈরি করো
        id: version
        run: echo "tag=v1.0.${{ github.run_number }}" >> $env:GITHUB_OUTPUT

      - name: 🚀 Auto Release করো
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "🌀 Vortex ${{ steps.version.outputs.tag }}"
          body: |
            ## 🌀 Vortex Agent — Windows

            ### 📥 Install করো
            1. `Vortex-Agent.exe` download করো
            2. Double click করে চালাও
            3. প্রথমবার password set করো
            4. Android App দিয়ে Scan করো → Connect!

            ### ✅ Features
            - Auto Discovery (IP লাগবে না)
            - Remote Shutdown / Restart / Sleep
            - Volume Control
            - Screenshot
            - Terminal Command
            - File Browser
            - System Info
            - Clipboard Sync
          files: agent/dist/Vortex-Agent.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
